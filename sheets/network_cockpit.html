<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Cockpit - Loop Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            color: #e8e8e8;
            overflow: hidden;
            min-height: 100vh;
        }

        .network-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Network Canvas */
        #network-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0f0f0f 0%, #000000 100%);
        }

        /* Central UI Panels */
        .central-panels {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        .central-panels > * {
            pointer-events: auto;
        }

        /* Top Panel - Finalize Loop Button */
        .finalize-panel {
            background: linear-gradient(135deg, rgba(40, 40, 40, 0.95), rgba(20, 20, 20, 0.95));
            border: 2px solid #50c8a0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(80, 200, 160, 0.3);
            backdrop-filter: blur(10px);
        }

        .finalize-button {
            background: linear-gradient(135deg, #50c8a0, #3ca080);
            border: none;
            border-radius: 10px;
            padding: 15px 30px;
            color: #0f0f0f;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .finalize-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(80, 200, 160, 0.4);
        }

        .finalize-button:disabled {
            background: linear-gradient(135deg, #3a3a3a, #2c2c2c);
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Left Panel - Loop Lifecycle Tracker */
        .lifecycle-panel {
            position: absolute;
            top: 50%;
            left: 30px;
            transform: translateY(-50%);
            background: linear-gradient(135deg, rgba(40, 40, 40, 0.95), rgba(20, 20, 20, 0.95));
            border: 2px solid #808080;
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 8px 32px rgba(128, 128, 128, 0.2);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .lifecycle-title {
            color: #c0c0c0;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #4a4a4a;
            padding-bottom: 10px;
        }

        .lifecycle-tracker {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .lifecycle-stage {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .lifecycle-stage.active {
            background: rgba(59, 130, 246, 0.2);
            border-left: 3px solid #3b82f6;
        }

        .lifecycle-stage.completed {
            background: rgba(80, 200, 160, 0.1);
            border-left: 3px solid #50c8a0;
        }

        .lifecycle-stage.pending {
            background: rgba(128, 128, 128, 0.1);
            border-left: 3px solid #808080;
        }

        .stage-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #666;
        }

        .stage-indicator.active {
            background: #3b82f6;
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .stage-indicator.completed {
            background: #50c8a0;
            border-color: #50c8a0;
        }

        .stage-indicator.pending {
            background: #808080;
            border-color: #808080;
        }

        .stage-label {
            flex: 1;
            font-size: 0.9em;
            color: #cccccc;
        }

        .stage-status {
            font-size: 0.8em;
            color: #999;
        }

        /* Top-Left Panel - AI Life Coordinate Monitor */
        .life-monitor-panel {
            position: absolute;
            top: 30px;
            left: 350px;
            background: linear-gradient(135deg, rgba(40, 40, 40, 0.95), rgba(20, 20, 20, 0.95));
            border: 2px solid #6b46c1;
            border-radius: 15px;
            padding: 20px;
            width: 280px;
            box-shadow: 0 8px 32px rgba(107, 70, 193, 0.3);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .life-monitor-title {
            color: #c0c0c0;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #4a4a4a;
            padding-bottom: 10px;
        }

        .life-coordinate-system {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: radial-gradient(circle, rgba(30, 30, 30, 0.8) 0%, rgba(20, 20, 20, 0.8) 100%);
            border-radius: 50%;
            border: 2px solid #6b46c1;
            overflow: hidden;
        }

        .coordinate-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .coordinate-grid::before,
        .coordinate-grid::after {
            content: '';
            position: absolute;
            background: rgba(107, 70, 193, 0.3);
        }

        .coordinate-grid::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            transform: translateY(-0.5px);
        }

        .coordinate-grid::after {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            transform: translateX(-0.5px);
        }

        .life-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #6b46c1, #553c9a);
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(107, 70, 193, 0.8);
            transition: all 3s ease-in-out;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .life-trail {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .life-confidence {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9em;
            color: #cccccc;
        }

        .confidence-value {
            font-size: 1.2em;
            font-weight: 600;
            color: #6b46c1;
        }

        .life-interpretation {
            text-align: center;
            margin-top: 10px;
            font-size: 0.8em;
            color: #999;
            min-height: 2.5em;
        }

        /* Bottom Panel - Pre-finalization Audit */
        .audit-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(40, 40, 40, 0.95), rgba(20, 20, 20, 0.95));
            border: 2px solid #a6a6a6;
            border-radius: 15px;
            padding: 20px;
            width: 600px;
            box-shadow: 0 8px 32px rgba(166, 166, 166, 0.2);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .audit-title {
            color: #c0c0c0;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #4a4a4a;
            padding-bottom: 10px;
        }

        .audit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .audit-item {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background: rgba(30, 30, 30, 0.5);
            border: 1px solid #4a4a4a;
        }

        .audit-icon {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .audit-label {
            font-size: 0.8em;
            color: #cccccc;
            margin-bottom: 3px;
        }

        .audit-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #a6a6a6;
        }

        .audit-value.pass {
            color: #50c8a0;
        }

        .audit-value.fail {
            color: #c85050;
        }

        .audit-button {
            display: block;
            margin: 15px auto 0;
            background: linear-gradient(135deg, #a6a6a6, #808080);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #0f0f0f;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .audit-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(166, 166, 166, 0.3);
        }

        .audit-results {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            font-size: 0.85em;
            color: #c0c0c0;
            max-height: 200px;
            overflow-y: auto;
        }
        .maintenance-panel {
            position: absolute;
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, rgba(40, 40, 40, 0.95), rgba(20, 20, 20, 0.95));
            border: 2px solid #b0b0b0;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(176, 176, 176, 0.2);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .maintenance-button {
            background: linear-gradient(135deg, #b0b0b0, #909090);
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            color: #1a1a1a;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .maintenance-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(176, 176, 176, 0.3);
        }

        /* Tool Detail Pages */
        .tool-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            z-index: 2000;
            display: none;
            overflow-y: auto;
        }

        .tool-header {
            background: linear-gradient(135deg, rgba(40, 40, 40, 0.95), rgba(20, 20, 20, 0.95));
            padding: 20px;
            border-bottom: 1px solid #4a4a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .tool-title {
            font-size: 1.5em;
            font-weight: 600;
            color: #c0c0c0;
        }

        .tool-back {
            background: #4a4a4a;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            color: #e8e8e8;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tool-back:hover {
            background: #666;
        }

        .tool-content {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Service item styles for tool pages */
        .service-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(30, 30, 30, 0.5);
            border: 1px solid #4a4a4a;
            transition: all 0.3s ease;
        }

        .service-item:hover {
            background: rgba(40, 40, 40, 0.7);
            border-color: #4a90e2;
        }

        .service-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #666;
            flex-shrink: 0;
        }

        .service-status.running {
            background: #50c8a0;
            border-color: #50c8a0;
            box-shadow: 0 0 8px rgba(80, 200, 160, 0.6);
        }

        .service-status.stopped {
            background: #666;
            border-color: #666;
        }

        .service-status.error {
            background: #e74c3c;
            border-color: #e74c3c;
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.6);
        }

        .service-info {
            flex: 1;
            min-width: 0;
        }

        .service-name {
            font-size: 0.9em;
            font-weight: 600;
            color: #e8e8e8;
            margin-bottom: 2px;
        }

        .service-desc {
            font-size: 0.75em;
            color: #a0a0a0;
            line-height: 1.2;
        }

        .service-metrics-button {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .service-metrics-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
        }

        /* Network Nodes */
        .network-node {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 2em;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 500;
        }

        .network-node:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255,255,255,0.3);
        }

        .node-tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #e8e8e8;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
            white-space: nowrap;
        }

        .node-tooltip.visible {
            opacity: 1;
        }

        /* Loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #808080;
            font-size: 1.2em;
            z-index: 1500;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .lifecycle-panel {
                width: 250px;
                left: 20px;
            }

            .audit-panel {
                width: 500px;
            }
        }

        @media (max-width: 768px) {
            .central-panels {
                transform: translate(-50%, -50%) scale(0.8);
            }

            .lifecycle-panel {
                position: static;
                transform: none;
                width: 100%;
                max-width: 300px;
                margin: 0 auto;
            }

            .audit-panel {
                position: static;
                transform: none;
                width: 100%;
                max-width: 500px;
                margin: 20px auto 0;
            }

            .maintenance-panel {
                position: static;
                margin: 20px auto 0;
                width: fit-content;
            }
        }
    </style>
</head>
<body>
    <div class="network-container">
        <!-- Network Visualization Canvas -->
        <canvas id="network-canvas"></canvas>

        <!-- Central UI Panels -->
        <div class="central-panels">
            <!-- Finalize Loop Button -->
            <div class="finalize-panel">
                <button id="finalize-loop-btn" class="finalize-button" onclick="finalizeLoop()">
                    🚀 Finalize Loop
                </button>
                <div id="finalize-status" style="margin-top: 10px; font-size: 0.9em; color: #999;"></div>
            </div>
        </div>

        <!-- Left Panel - Loop Lifecycle Tracker -->
        <div class="lifecycle-panel">
            <div class="lifecycle-title">🔄 Loop Lifecycle</div>
            <div id="lifecycle-tracker" class="lifecycle-tracker">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Top-Left Panel - AI Life Coordinate Monitor -->
        <div class="life-monitor-panel">
            <div class="life-monitor-title">🧠 AI Life Monitor</div>
            <div class="life-coordinate-system">
                <div class="coordinate-grid"></div>
                <div class="life-trail" id="life-trail"></div>
                <div class="life-dot" id="life-dot"></div>
            </div>
            <div class="life-confidence">
                Confidence: <span class="confidence-value" id="confidence-value">--</span> | 
                Arousal: <span class="arousal-value" id="arousal-value">--</span>
            </div>
            <div class="life-interpretation" id="life-interpretation">
                Initializing...
            </div>
        </div>

        <!-- Bottom Panel - Pre-finalization Audit -->
        <div class="audit-panel">
            <div class="audit-title">📊 Pre-Finalization Audit</div>
            <div class="audit-grid">
                <div class="audit-item">
                    <div class="audit-icon">📋</div>
                    <div class="audit-label">Tasks</div>
                    <div id="audit-tasks" class="audit-value">--</div>
                </div>
                <div class="audit-item">
                    <div class="audit-icon">🔍</div>
                    <div class="audit-label">Validation</div>
                    <div id="audit-validation" class="audit-value">--</div>
                </div>
                <div class="audit-item">
                    <div class="audit-icon">📁</div>
                    <div class="audit-label">Archives</div>
                    <div id="audit-archives" class="audit-value">--</div>
                </div>
            </div>
            <button class="audit-button" onclick="runIntegrityCheck()">🔍 Run Integrity Check</button>
            <div id="audit-results" class="audit-results"></div>
        </div>

        <!-- Maintenance Button -->
        <div class="maintenance-panel">
            <button class="maintenance-button" onclick="triggerMaintenance()">
                🔧 Maintenance Work
            </button>
        </div>

        <!-- Tool Detail Pages -->
        <div id="tool-pages">
            <!-- Individual tool pages will be added here -->
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="loading">Loading Network...</div>

        <!-- Node Tooltip -->
        <div id="node-tooltip" class="node-tooltip"></div>
    </div>

    <script>
        // Network visualization variables
        let scene, camera, renderer, nodes = [], edges = [];
        let mouse = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();
        let hoveredNode = null;

        // Tool definitions
        const tools = [
            {
                id: 'current-action',
                name: 'Current Action',
                icon: '🎯',
                color: '#808080',
                description: 'View and manage current action requirements',
                pageContent: `
                    <div class="tool-content">
                        <h2>🎯 Current Action Required</h2>
                        <p>View the current action that needs to be taken to progress the loop.</p>
                        <div id="current-action-content" style="background: #1a1a1a; padding: 20px; border-radius: 8px; margin-top: 20px;">
                            Loading...
                        </div>
                        <div style="margin-top: 20px;">
                            <button onclick="refreshCurrentAction()" style="background: #808080; border: none; padding: 10px 20px; border-radius: 5px; color: white; cursor: pointer;">
                                🔄 Refresh
                            </button>
                        </div>
                    </div>
                `
            },
            {
                id: 'loop-sphere',
                name: 'Loop Sphere',
                icon: '🌐',
                color: '#919191',
                description: '3D visualization of project files and activity',
                pageContent: `
                    <div class="tool-content">
                        <h2>🌐 Loop Sphere - 3D Project Visualization</h2>
                        <p>Real-time visualization of project files, references, and AI activity.</p>
                        <div id="sphere-container" style="width: 100%; height: 600px; background: rgba(0,0,0,0.5); border-radius: 8px; margin-top: 20px;">
                            <canvas id="loop-sphere-canvas" style="width: 100%; height: 100%; display: block;"></canvas>
                        </div>
                        <div style="margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                            <div style="background: #1a1a1a; padding: 15px; border-radius: 8px;">
                                <div style="color: #cccccc; margin-bottom: 5px;">Files</div>
                                <div style="color: #a6a6a6; font-size: 1.5em; font-weight: bold;" id="file-count">--</div>
                            </div>
                            <div style="background: #1a1a1a; padding: 15px; border-radius: 8px;">
                                <div style="color: #cccccc; margin-bottom: 5px;">References</div>
                                <div style="color: #a6a6a6; font-size: 1.5em; font-weight: bold;" id="ref-count">--</div>
                            </div>
                            <div style="background: #1a1a1a; padding: 15px; border-radius: 8px;">
                                <div style="color: #cccccc; margin-bottom: 5px;">Active</div>
                                <div style="color: #a6a6a6; font-size: 1.2em;" id="active-file">--</div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                id: 'live-preview',
                name: 'Live Preview',
                icon: '📺',
                color: '#b0b0b0',
                description: 'Preview web projects in real-time',
                pageContent: `
                    <div class="tool-content">
                        <h2>📺 Live Preview - Web Project Viewer</h2>
                        <p>Preview web projects in real-time without leaving the cockpit.</p>
                        <div style="display: flex; gap: 10px; margin: 20px 0; align-items: center;">
                            <input type="text" id="preview-url" placeholder="Enter URL (e.g., http://localhost:5000)" 
                                value="http://localhost:5000" style="flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #4a4a4a; 
                                border-radius: 5px; color: #cccccc;">
                            <button onclick="loadPreview()" style="padding: 12px 25px; background: #808080; border: none; border-radius: 5px; color: white; cursor: pointer;">
                                🔄 Load
                            </button>
                        </div>
                        <div id="preview-container" style="width: 100%; height: 600px; background: #0f0f0f; border-radius: 8px; overflow: hidden; border: 1px solid #4a4a4a;">
                            <iframe id="preview-frame" style="width: 100%; height: 100%; border: none; background: white;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" src="about:blank"></iframe>
                        </div>
                    </div>
                `
            },
            {
                id: 'qwen-chat',
                name: 'Qwen Chat',
                icon: '💬',
                color: '#4a90d9',
                description: 'Chat with Qwen AI assistant',
                pageContent: `
                    <div class="tool-content">
                        <h2>💬 Qwen Chat Assistant</h2>

        // Initialize the network
        function init() {
            // Create 2D DOM-based network nodes
            createNetwork();

        function createNetwork() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const radius = Math.min(window.innerWidth, window.innerHeight) * 0.3;

            // Create SVG for connections
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.style.position = 'absolute';
            svg.style.top = '0';
            svg.style.left = '0';
            svg.style.width = '100%';
            svg.style.height = '100%';
            svg.style.pointerEvents = 'none';
            svg.style.zIndex = '400';
            document.body.appendChild(svg);

            tools.forEach((tool, index) => {
                const angle = (index / tools.length) * Math.PI * 2;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                // Create DOM node
                const nodeElement = document.createElement('div');
                nodeElement.className = 'network-node';
                nodeElement.style.left = `${x - 40}px`;
                nodeElement.style.top = `${y - 40}px`;
                nodeElement.style.background = `radial-gradient(circle, ${tool.color}, ${tool.color}80)`;
                nodeElement.innerHTML = tool.icon;
                nodeElement.dataset.toolId = tool.id;
                nodeElement.title = tool.name;

                document.body.appendChild(nodeElement);

                // Store node info
                nodes.push({
                    element: nodeElement,
                    tool: tool,
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            });

            // Create connections between nodes
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', nodes[i].x);
                    line.setAttribute('y1', nodes[i].y);
                    line.setAttribute('x2', nodes[j].x);
                    line.setAttribute('y2', nodes[j].y);
                    line.setAttribute('stroke', '#50c8a0');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('opacity', '0.3');
                    svg.appendChild(line);
                    
                    edges.push({
                        line: line,
                        from: nodes[i],
                        to: nodes[j],
                        strength: Math.random() * 0.5 + 0.1
                    });
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update node positions with subtle movement
            nodes.forEach(node => {
                node.x += node.vx;
                node.y += node.vy;

                // Boundary checking
                if (node.x < 100 || node.x > window.innerWidth - 100) node.vx *= -1;
                if (node.y < 100 || node.y > window.innerHeight - 100) node.vy *= -1;

                node.element.style.left = `${node.x - 40}px`;
                node.element.style.top = `${node.y - 40}px`;
            });

            // Update connection lines
            edges.forEach(edge => {
                edge.line.setAttribute('x1', edge.from.x);
                edge.line.setAttribute('y1', edge.from.y);
                edge.line.setAttribute('x2', edge.to.x);
                edge.line.setAttribute('y2', edge.to.y);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

        function onMouseMove(event) {
            // Update tooltip for DOM nodes
            const tooltip = document.getElementById('node-tooltip');
            const hovered = nodes.find(node => {
                const rect = node.element.getBoundingClientRect();
                return event.clientX >= rect.left && event.clientX <= rect.right &&
                       event.clientY >= rect.top && event.clientY <= rect.bottom;
            });

            if (hovered) {
                tooltip.textContent = hovered.tool.description;
                tooltip.style.left = `${event.clientX + 10}px`;
                tooltip.style.top = `${event.clientY - 10}px`;
                tooltip.classList.add('visible');
                hoveredNode = hovered;
            } else {
                tooltip.classList.remove('visible');
                hoveredNode = null;
            }
        }

        function initLoopSphere() {
            const canvas = document.getElementById('loop-sphere-canvas');
            if (!canvas) return;

            // Three.js setup for loop sphere
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setClearColor(0x0a0a0a, 1);

            camera.position.z = 5;

            // Add lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);

            // Create 3D spheres for tools
            const sphereGeometry = new THREE.SphereGeometry(0.3, 32, 32);
            const sphereMeshes = [];
            const connections = [];

            tools.forEach((tool, index) => {
                const material = new THREE.MeshPhongMaterial({ 
                    color: tool.color,
                    emissive: tool.color,
                    emissiveIntensity: 0.2
                });
                const sphere = new THREE.Mesh(sphereGeometry, material);
                
                // Position in 3D space
                const angle = (index / tools.length) * Math.PI * 2;
                const radius = 2;
                sphere.position.x = Math.cos(angle) * radius;
                sphere.position.z = Math.sin(angle) * radius;
                sphere.position.y = (Math.random() - 0.5) * 0.5; // Slight Y variation
                
                sphere.userData = { tool: tool };
                scene.add(sphere);
                sphereMeshes.push(sphere);
            });

            // Create connections between spheres
            for (let i = 0; i < sphereMeshes.length; i++) {
                for (let j = i + 1; j < sphereMeshes.length; j++) {
                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array([
                        sphereMeshes[i].position.x, sphereMeshes[i].position.y, sphereMeshes[i].position.z,
                        sphereMeshes[j].position.x, sphereMeshes[j].position.y, sphereMeshes[j].position.z
                    ]);
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    
                    const material = new THREE.LineBasicMaterial({ 
                        color: 0x50c8a0, 
                        transparent: true, 
                        opacity: 0.3 
                    });
                    const line = new THREE.Line(geometry, material);
                    scene.add(line);
                    connections.push(line);
                }
            }

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                
                // Rotate camera slowly
                camera.position.x = Math.cos(Date.now() * 0.0005) * 5;
                camera.position.z = Math.sin(Date.now() * 0.0005) * 5;
                camera.lookAt(0, 0, 0);
                
                // Animate connections
                connections.forEach((line, index) => {
                    const opacity = 0.3 + Math.sin(Date.now() * 0.001 + index) * 0.2;
                    line.material.opacity = Math.max(0.1, opacity);
                });
                
                // Subtle sphere floating
                sphereMeshes.forEach((sphere, index) => {
                    sphere.position.y += Math.sin(Date.now() * 0.001 + index * 0.5) * 0.002;
                });
                
                renderer.render(scene, camera);
            }
            
            animate();

            // Update stats
            document.getElementById('file-count').textContent = tools.length;
            document.getElementById('ref-count').textContent = connections.length;
            document.getElementById('active-file').textContent = 'Network View';
        }

        function loadTokenData() {
            fetch('/api/token-monitor')
                .then(response => response.json())
                .then(data => {
                    try {
                        // Update circle progress
                        const percentage = data.percentage || 0;
                        const progressCircle = document.getElementById('token-progress');
                        const percentText = document.getElementById('token-percent');
                        const usedText = document.getElementById('token-used');
                        
                        // Use zone color from API (real-time from Claude CSV)
                        const zoneColor = data.zone_color || '#50c8a0';
                        const zone = data.zone || 'SAFE';
                        
                        if (progressCircle) {
                            const circumference = 628; // 2 * π * 100
                            const offset = circumference - (percentage / 100) * circumference;
                            progressCircle.setAttribute('stroke-dashoffset', offset);
                            progressCircle.setAttribute('stroke', zoneColor);
                        }
                        
                        if (percentText) {
                            percentText.textContent = `${percentage}%`;
                            percentText.setAttribute('fill', zoneColor);
                        }
                        if (usedText) usedText.textContent = `${data.total_used?.toLocaleString() || 0} / ${data.limit?.toLocaleString() || '200k'} tokens`;
                        
                        // Update session and remaining tokens
                        const sessionTokens = document.getElementById('session-tokens');
                        const remainingTokens = document.getElementById('remaining-tokens');
                        
                        if (sessionTokens) sessionTokens.textContent = `~${(data.current_session || 0).toLocaleString()}`;
                        if (remainingTokens) {
                            remainingTokens.textContent = `~${(data.remaining || 0).toLocaleString()}`;
                            remainingTokens.style.color = zoneColor;
                        }
                        
                        // Update zone indicator
                        const zoneIndicator = document.getElementById('token-zone');
                        if (zoneIndicator) {
                            zoneIndicator.textContent = zone;
                            zoneIndicator.style.color = zoneColor;
                        }
                        
                        // Update source and model info
                        const sourceEl = document.getElementById('token-source');
                        const modelEl = document.getElementById('token-model');
                        if (sourceEl) sourceEl.textContent = `Source: ${data.source || 'unknown'}`;
                        if (modelEl) modelEl.textContent = `Model: ${data.model || 'unknown'}`;
                        
                        // Handle finalization warning
                        const warningEl = document.getElementById('finalize-warning');
                        const msgEl = document.getElementById('finalize-message');
                        const actionsEl = document.getElementById('finalize-actions');
                        
                        if (warningEl && data.should_finalize) {
                            warningEl.style.display = 'block';
                            const urgency = data.finalize_urgency || 'MEDIUM';
                            
                            if (urgency === 'CRITICAL') {
                                warningEl.style.borderColor = '#ff0000';
                                warningEl.style.background = '#2a0a0a';
                                msgEl.innerHTML = '🚨 CRITICAL: Finalize NOW!';
                                msgEl.style.color = '#ff0000';
                            } else if (urgency === 'HIGH') {
                                warningEl.style.borderColor = '#f04040';
                                warningEl.style.background = '#2a1a1a';
                                msgEl.innerHTML = '⚠️ HIGH: Start finalization immediately';
                                msgEl.style.color = '#f04040';
                            } else {
                                warningEl.style.borderColor = '#f0c040';
                                warningEl.style.background = '#2a2a1a';
                                msgEl.innerHTML = '🟡 Begin wrapping up current work';
                                msgEl.style.color = '#f0c040';
                            }
                            
                            if (actionsEl) {
                                actionsEl.textContent = 'AI should: Complete task → Write report → Finalize loop';
                            }
                        } else if (warningEl) {
                            warningEl.style.display = 'none';
                        }
                    } catch (err) {
                        console.error('Token data processing error:', err && err.stack ? err.stack : err);
                        // swallow the error to avoid the outer catch resetting UI; fall back will be applied only if fetch fails
                    }
                })
                .catch(error => {
                    console.error('Failed to load token data:', error);
                    // Set fallback values
                    document.getElementById('token-percent').textContent = '0%';
                    document.getElementById('token-used').textContent = '0 / 1M tokens';
                    document.getElementById('session-tokens').textContent = '~0';
                    document.getElementById('remaining-tokens').textContent = '~1M';
                });
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                // Show temporary success feedback
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = '✅ Copied!';
                setTimeout(() => {
                    button.textContent = originalText;
                }, 2000);
            } catch (error) {
                console.error('Failed to copy to clipboard:', error);
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = '✅ Copied!';
                setTimeout(() => {
                    button.textContent = originalText;
                }, 2000);
            }
        }

        function initLoopSphere() {
            const canvas = document.getElementById('loop-sphere-canvas');
            if (!canvas) return;

            // Three.js setup for loop sphere
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setClearColor(0x0a0a0a, 1);

            camera.position.z = 5;

            // Add lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);

            // Create 3D spheres for tools
            const sphereGeometry = new THREE.SphereGeometry(0.3, 32, 32);
            const sphereMeshes = [];
            const connections = [];

            tools.forEach((tool, index) => {
                const material = new THREE.MeshPhongMaterial({ 
                    color: tool.color,
                    emissive: tool.color,
                    emissiveIntensity: 0.2
                });
                const sphere = new THREE.Mesh(sphereGeometry, material);
                
                // Position in 3D space
                const angle = (index / tools.length) * Math.PI * 2;
                const radius = 2;
                sphere.position.x = Math.cos(angle) * radius;
                sphere.position.z = Math.sin(angle) * radius;
                sphere.position.y = (Math.random() - 0.5) * 0.5; // Slight Y variation
                
                sphere.userData = { tool: tool };
                scene.add(sphere);
                sphereMeshes.push(sphere);
            });

            // Create connections between spheres
            for (let i = 0; i < sphereMeshes.length; i++) {
                for (let j = i + 1; j < sphereMeshes.length; j++) {
                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array([
                        sphereMeshes[i].position.x, sphereMeshes[i].position.y, sphereMeshes[i].position.z,
                        sphereMeshes[j].position.x, sphereMeshes[j].position.y, sphereMeshes[j].position.z
                    ]);
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    
                    const material = new THREE.LineBasicMaterial({ 
                        color: 0x50c8a0, 
                        transparent: true, 
                        opacity: 0.3 
                    });
                    const line = new THREE.Line(geometry, material);
                    scene.add(line);
                    connections.push(line);
                }
            }

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                
                // Rotate camera slowly
                camera.position.x = Math.cos(Date.now() * 0.0005) * 5;
                camera.position.z = Math.sin(Date.now() * 0.0005) * 5;
                camera.lookAt(0, 0, 0);
                
                // Animate connections
                connections.forEach((line, index) => {
                    const opacity = 0.3 + Math.sin(Date.now() * 0.001 + index) * 0.2;
                    line.material.opacity = Math.max(0.1, opacity);
                });
                
                // Subtle sphere floating
                sphereMeshes.forEach((sphere, index) => {
                    sphere.position.y += Math.sin(Date.now() * 0.001 + index * 0.5) * 0.002;
                });
                
                renderer.render(scene, camera);
            }
            
            animate();

            // Update stats
            document.getElementById('file-count').textContent = tools.length;
            document.getElementById('ref-count').textContent = connections.length;
            document.getElementById('active-file').textContent = 'Network View';
        }

        function formatFinalizeError(data) {
            if (data && data.blocked && Array.isArray(data.violations) && data.violations.length > 0) {
                return 'Finalization blocked: ' + data.violations[0];
            }
            return (data && data.error) ? data.error : 'Unknown error';
        }

        async function finalizeLoop() {
            const btn = document.getElementById('finalize-loop-btn');
            const status = document.getElementById('finalize-status');

            btn.disabled = true;
            btn.textContent = 'Finalizing...';
            status.textContent = 'Running finalize guard checks...';
            status.style.color = '#c8a050';

            try {
                const statusResp = await fetch('/api/status');
                const statusData = await statusResp.json();
                if (statusData.status !== 'ACTIVE') {
                    throw new Error('Finalize blocked: status is ' + statusData.status + ' (must be ACTIVE)');
                }

                const gatesResp = await fetch('/api/validate-gates');
                const gatesData = await gatesResp.json();
                const preFinal = gatesData && gatesData.gates ? gatesData.gates.pre_finalization : null;
                if (preFinal && preFinal.valid === false) {
                    throw new Error(preFinal.error || 'Pre-finalization gate failed');
                }

                const auditResp = await fetch('/api/audit-status');
                const auditData = await auditResp.json();
                if (!auditData.success || !auditData.canFinalize) {
                    const topViolation = (auditData.violations || [])[0];
                    throw new Error(topViolation || auditData.message || 'Pre-finalization audit failed');
                }

                const response = await fetch('/api/finalize-loop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await response.json();

                if (data.success) {
                    status.textContent = 'Loop finalized successfully!';
                    status.style.color = '#50c8a0';
                    setTimeout(() => {
                        fetchStatus();
                    }, 1500);
                } else {
                    status.textContent = 'Finalization failed: ' + formatFinalizeError(data);
                    status.style.color = '#c85050';
                }
            } catch (error) {
                status.textContent = 'Finalization failed: ' + error.message;
                status.style.color = '#c85050';
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Finalize Loop';
            }
        }

        function refreshServiceMetrics() {
            // Fetch real service status from API
            fetch('/api/service-status')
                .then(response => response.json())

                    if (services) {
                        updateServiceStatuses(services);
                        return;
                    }
                    console.error('Failed to fetch service status:', data && data.error ? data.error : data);
                    updateServiceStatus('backup-status', 'error');
                    updateServiceStatus('telemetry-status', 'error');
                    updateServiceStatus('integrity-status', 'error');
                    updateServiceStatus('token-status', 'error');
                    updateServiceStatus('orchestrator-status', 'error');
                })
                .catch(error => {
                    console.error('Error fetching service status:', error);
                    updateServiceStatus('backup-status', 'error');
                    updateServiceStatus('telemetry-status', 'error');
                    updateServiceStatus('integrity-status', 'error');
                    updateServiceStatus('token-status', 'error');
                    updateServiceStatus('orchestrator-status', 'error');
                });
        }

        function updateServiceStatuses(services) {
            // Update each service status based on API response
            const statusMap = {
                'backup_manager': 'backup-status',
                'behavioral_telemetry': 'telemetry-status',
                'ai_integrity': 'integrity-status',
                'token_monitor': 'token-status',
                'service_orchestrator': 'orchestrator-status'
            };

            Object.keys(services).forEach(serviceKey => {
                const service = services[serviceKey];
                const elementId = statusMap[serviceKey];
                if (elementId) {
                    const status = String(service.status || '').toLowerCase();
                    const runningFlag = (typeof service.running === 'boolean') ? service.running : null;
                    const inferredRunning = runningFlag !== null
                        ? runningFlag
                        : (status === 'running' || status === 'healthy');
                    const statusClass = inferredRunning
                        ? 'running'
                        : (status === 'error' ? 'error' : 'stopped');
                    updateServiceStatus(elementId, statusClass);
                }
            });
        }

        function updateServiceStatus(elementId, status) {
            const element = document.getElementById(elementId);
            if (element) {
                // Remove existing status classes
                element.classList.remove('running', 'stopped', 'error');

                // Add new status class
                element.classList.add(status);
            }
        }
