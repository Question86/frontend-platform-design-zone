                const tasks = Array.isArray(cluster) ? cluster : (cluster.tasks || []);
                html += `<div style="margin-bottom: 12px; padding: 8px; background: rgba(80, 200, 160, 0.05); border-radius: 5px; border-left: 3px solid #50c8a0;">`;
                html += `<div style="color: #50c8a0; font-weight: bold; margin-bottom: 5px; font-size: 0.9em;">Cluster ${clusterIdx + 1} (${tasks.length} tasks)</div>`;
                
                tasks.forEach(taskId => {
                    html += `
                        <label style="display: block; padding: 4px; cursor: pointer; color: #cccccc;">
                            <input type="checkbox" value="${taskId}" data-cluster="${clusterIdx}" 
                                onchange="handleTaskSelection()" checked
                                style="margin-right: 8px; accent-color: #50c878;">
                            ${taskId}
                        </label>
                    `;
                });
                
                html += '</div>';
            });
            
            checkboxesDiv.innerHTML = html;
            updateSelectionInfo();
            checkTaskConflicts();
        }

        function handleTaskSelection() {
            updateSelectionInfo();
            checkTaskConflicts();
        }

        function selectAllTasks() {
            const checkboxes = document.querySelectorAll('#task-checkboxes input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = true);
            updateSelectionInfo();
            checkTaskConflicts();
        }

        function deselectAllTasks() {
            const checkboxes = document.querySelectorAll('#task-checkboxes input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = false);
            updateSelectionInfo();
            hideConflictWarning();
        }

        function getSelectedTasks() {
            const checkboxes = document.querySelectorAll('#task-checkboxes input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function updateSelectionInfo() {
            const selected = getSelectedTasks();
            const infoDiv = document.getElementById('selection-info');
            if (infoDiv) {
                infoDiv.textContent = `${selected.length} task(s) selected`;
            }
        }

        // Conflict Detection Functions
        async function checkTaskConflicts() {
            const selectedTasks = getSelectedTasks();
            
            if (selectedTasks.length < 2) {
                hideConflictWarning();
                return;
            }
            
            try {
                const response = await fetch('/api/orchestrator/analyze-conflicts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tasks: selectedTasks })
                });
                
                const data = await response.json();
                
                if (data.conflicts && data.conflicts.length > 0) {
                    currentConflicts = data.conflicts;
                    showConflictWarning(data.conflicts, data.recommendation);
                } else {
                    currentConflicts = [];
                    hideConflictWarning();
                }
            } catch (error) {
                console.error('Conflict check failed:', error);
                currentConflicts = [];
                hideConflictWarning();
            }
        }

        function showConflictWarning(conflicts, recommendation) {
            const warning = document.getElementById('conflictWarning');
            const details = document.getElementById('conflictDetails');
            const detailsList = document.getElementById('conflictDetailsList');
            const override = document.getElementById('conflictOverride');
            
            if (!warning || !details) return;
            
            let conflictText = `${conflicts.length} file conflict(s) detected. `;
            if (recommendation) {
                conflictText += recommendation;
            }
            
            details.textContent = conflictText;
            
            // Show conflict details
            if (detailsList) {
                let detailsHtml = '<div style="font-weight: bold; margin-bottom: 8px;">Affected files:</div>';
                conflicts.forEach(conflict => {
                    detailsHtml += `<div style="margin-bottom: 5px;">• ${conflict.file}: ${conflict.tasks.join(', ')}</div>`;
                });
                detailsList.innerHTML = detailsHtml;
            }
            
            if (override) override.style.display = 'block';
            warning.style.display = 'block';
        }

        function hideConflictWarning() {
            const warning = document.getElementById('conflictWarning');
            const override = document.getElementById('conflictOverride');
            if (warning) warning.style.display = 'none';
            if (override) override.style.display = 'none';
            currentConflicts = [];
        }

        function toggleConflictDetails() {
            const detailsList = document.getElementById('conflictDetailsList');
            const button = document.getElementById('showConflictDetails');
            
            if (detailsList && button) {
                if (detailsList.style.display === 'none') {
                    detailsList.style.display = 'block';
                    button.innerHTML = 'Hide Details ▲';
                } else {
                    detailsList.style.display = 'none';
                    button.innerHTML = 'Show Details ▼';
                }
            }
        }

        function hasUnacknowledgedConflicts() {
            return currentConflicts.length > 0 && !document.getElementById('acknowledgeConflicts')?.checked;
        }

        // Execution Functions
        async function executeParallelTasks() {
            // Use selected tasks from task selector interface
            let taskIds = getSelectedTasks();
            
            // Check for unacknowledged conflicts
            if (hasUnacknowledgedConflicts()) {
                alert('⚠️ File conflicts detected!\n\nPlease either:\n1. Acknowledge the conflict warning, or\n2. Adjust your task selection to avoid conflicts.');
                return;
            }
            
            // If no tasks selected, fall back to analysis first cluster
            if (taskIds.length === 0) {
                const analysisResp = await fetch('/api/orchestrator/analyze');
                const analysis = await analysisResp.json();
                
                if (!analysis.success) {
                    alert('Analysis failed: ' + analysis.error);
                    return;
                }
                
                if (!analysis.analysis.parallelizable || analysis.analysis.parallelizable.length === 0) {
                    alert('No parallelizable tasks found. Click ANALYZE first, then select tasks.');
                    return;
                }
                
                const firstCluster = analysis.analysis.parallelizable[0];
                taskIds = Array.isArray(firstCluster) ? firstCluster : (firstCluster.tasks || []);
            }
            
            const maxAgents = parseInt(document.getElementById('max-agents').value);
            const executeCount = Math.min(taskIds.length, maxAgents);
            
            // Include conflict warning in confirmation if conflicts were acknowledged
            let confirmMsg = `Execute ${executeCount} of ${taskIds.length} selected tasks in parallel (max ${maxAgents} agents)?`;
            if (currentConflicts.length > 0) {
                confirmMsg += `\n\n⚠️ Warning: ${currentConflicts.length} file conflict(s) acknowledged.`;
            }
            
            if (!confirm(confirmMsg)) return;
            
            document.getElementById('execution-progress').style.display = 'block';
            updateProgress(0, `Spawning ${executeCount} agents...`);
            
            // Start real-time polling
            startOrchestratorPolling();
            
            try {
                const resp = await fetch('/api/orchestrator/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        taskIds: taskIds.slice(0, maxAgents),
                        autoMerge: true,
                        autoCleanup: true,
                        waitForAgents: true  // Real agent mode - VS Code extension will spawn agents
                    })
                });
                
                const result = await resp.json();
                
                if (result.success) {
                    // In waitForAgents mode, sessions are pending - keep polling for completion
                    const agentsSpawned = result.result.agents_spawned || 0;
                    const isWaitingForAgents = result.result.metrics && result.result.metrics.mode === 'wait_for_agents';
                    
                    if (isWaitingForAgents && agentsSpawned > 0) {
                        // Don't stop polling - agents are working
                        updateProgress(10, `🚀 Spawned ${agentsSpawned} agents - waiting for VS Code to claim...`);
                        // Polling continues via startOrchestratorPolling() - it will update progress
                    } else {
                        // Simulation mode or no agents - complete immediately
                        stopOrchestratorPolling();
                        updateProgress(100, `✅ Completed: ${result.result.agents_completed}/${result.result.agents_spawned}`);
                        setTimeout(() => {
                            refreshOrchestratorStatus();
                            document.getElementById('execution-progress').style.display = 'none';
                        }, 3000);
                    }
                } else {
                    stopOrchestratorPolling();
                    updateProgress(0, `❌ Failed: ${result.error}`);
                }
            } catch (error) {
                stopOrchestratorPolling();
                updateProgress(0, `❌ Error: ${error.message}`);
            }
        }

        function updateProgress(percent, text) {
            const bar = document.getElementById('progress-bar');
            const textDiv = document.getElementById('progress-text');
            if (bar) bar.style.width = percent + '%';
            if (textDiv) textDiv.textContent = text;
        }

        // Real-Time Progress Polling
        function startOrchestratorPolling() {
            if (orchestratorPollingInterval) clearInterval(orchestratorPollingInterval);
            
            // Show polling indicator
            const indicator = document.getElementById('polling-indicator');
            if (indicator) indicator.style.display = 'block';
            
            orchestratorPollingInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/orchestrator');
                    const data = await response.json();
                    
                    if (!data.success) {
                        updateDashboard(null);
                        stopOrchestratorPolling();
                        return;
                    }
                    
                    const status = data.status;
                    const activeSessions = status.sessions.filter(s => 
                        s.status === 'working' || s.status === 'spawned'
                    );
                    
                    // Update progress based on session statuses
                    const totalSessions = status.sessions.length;
                    const completedSessions = status.sessions.filter(s => 
                        s.status === 'completed' || s.status === 'failed'
                    ).length;
                    const workingSessions = status.sessions.filter(s => s.status === 'working').length;
                    const spawnedSessions = status.sessions.filter(s => s.status === 'spawned').length;
                    
                    if (totalSessions > 0) {
                        const percent = Math.round((completedSessions / totalSessions) * 100);
                        let statusText = '';
                        
                        if (spawnedSessions > 0 && workingSessions === 0 && completedSessions === 0) {
                            // Waiting for VS Code to claim
                            statusText = `🚀 ${spawnedSessions} session(s) spawned - waiting for VS Code extension to claim...`;
                        } else if (workingSessions > 0) {
                            // Agents are working
                            statusText = `⚙️ ${workingSessions} agent(s) working, ${completedSessions}/${totalSessions} complete`;
                        } else if (completedSessions > 0) {
                            statusText = `✅ ${completedSessions}/${totalSessions} sessions complete`;
                        } else {
                            statusText = `⏳ Progress: ${completedSessions}/${totalSessions}`;
                        }
                        
                        // Progress bar: spawned=10%, working=50%, completed=100%
                        let visualPercent = 10; // base for spawned
                        if (workingSessions > 0) visualPercent = 30 + Math.round((completedSessions / totalSessions) * 70);
                        else if (completedSessions > 0) visualPercent = percent;
                        
                        updateProgress(visualPercent, statusText);
                    }
                    
                    // Update session list UI
                    updateOrchestratorSessionsUI(status);
                    updateDashboard(status);
                    
                    if (activeSessions.length === 0 && totalSessions > 0) {
                        // All sessions done
                        stopOrchestratorPolling();
                        updateProgress(100, `✅ All ${totalSessions} sessions complete`);
                        setTimeout(() => {
                            refreshOrchestratorStatus();
                        }, 1000);
                    }
                    
                } catch (error) {
                    console.error('Polling error:', error);
                    updateDashboard(null);
                    stopOrchestratorPolling();
                }
            }, 3000); // Poll every 3 seconds
        }

        function stopOrchestratorPolling() {
            if (orchestratorPollingInterval) {
                clearInterval(orchestratorPollingInterval);
                orchestratorPollingInterval = null;
            }
            // Hide polling indicator
            const indicator = document.getElementById('polling-indicator');
            if (indicator) indicator.style.display = 'none';
        }

        // Rollback Function
        async function rollbackOrchestrator() {
            if (!confirm('Rollback orchestrator to pre-parallel state? This will undo all parallel execution changes.')) return;
            
            try {
                const response = await fetch('/api/orchestrator/rollback', {
                    method: 'POST'
                });
                const data = await response.json();
                
                const resultDiv = document.getElementById('orchestrator-result');
                if (resultDiv) {
                    if (data.success) {
                        resultDiv.innerHTML = `<span style="color:#50c8a0;">✅ ${data.message}</span>`;
                        setTimeout(() => refreshOrchestratorStatus(), 1000);
                    } else {
                        resultDiv.innerHTML = `<span style="color:#c85050;">❌ ${data.error}</span>`;
                    }
                }
            } catch (error) {
                const resultDiv = document.getElementById('orchestrator-result');
                if (resultDiv) {
                    resultDiv.innerHTML = `<span style="color:#c85050;">❌ Error: ${error.message}</span>`;
                }
            }
        }

        // UI Update Functions
        function updateOrchestratorSessionsUI(status) {
            const sessionsDiv = document.getElementById('orchestrator-sessions');
            const statusDiv = document.getElementById('orchestrator-status-display');
            if (!sessionsDiv || !statusDiv) return;
            
            const sessions_status = status.sessions_by_status;
            statusDiv.innerHTML = `
                <div style="display: flex; flex-wrap: wrap; gap: 20px;">
                    <span style="color:#808080;">⏳ Pending: <strong>${sessions_status.pending}</strong></span>
                    <span style="color:#50a0c8;">🚀 Spawned: <strong>${sessions_status.spawned}</strong></span>
                    <span style="color:#a0c850;">⚙️ Working: <strong>${sessions_status.working}</strong></span>
                    <span style="color:#50c878;">✅ Completed: <strong>${sessions_status.completed}</strong></span>
                    <span style="color:#c85050;">❌ Failed: <strong>${sessions_status.failed}</strong></span>
                    <span style="color:#a050c8;">🎯 Max: <strong>${status.max_parallel_agents}</strong></span>
                </div>
            `;
            
            if (status.sessions && status.sessions.length > 0) {
                let sessionsHtml = '<div style="margin-top: 10px; font-size: 0.9em; color: #cccccc;"><strong>Sessions:</strong></div>';
                sessionsHtml += '<div style="margin-top: 5px; border: 1px solid #4a4a4a; border-radius: 5px; overflow: hidden;">';
                status.sessions.forEach(s => {
                    const statusEmoji = {'pending': '⏳', 'spawned': '🚀', 'working': '⚙️', 'completed': '✅', 'failed': '❌'}[s.status] || '❓';
                    const statusColor = {'pending': '#808080', 'spawned': '#50a0c8', 'working': '#a0c850', 'completed': '#50c878', 'failed': '#c85050'}[s.status] || '#808080';
                    
                    sessionsHtml += `
                        <div style="padding: 8px; border-bottom: 1px solid #4a4a4a;">
                            <span style="color: ${statusColor};">${statusEmoji} ${s.status}</span>
                            <span style="color: #cccccc; margin-left: 10px;">${s.task_id}</span>
                            <span style="color: #a050c8; float: right;">${s.progress}%</span>
                        </div>
                    `;
                });
                sessionsHtml += '</div>';
                sessionsDiv.innerHTML = sessionsHtml;
            }
        }

        // Dashboard Update Functions
        function updateDashboard(status) {
            const dashboard = document.getElementById('orchestratorDashboard');
            const timeline = document.getElementById('agentTimeline');
            if (!dashboard || !timeline) return;

            if (!status || !status.sessions || status.sessions.length === 0 || status.is_git_repo === false) {
                resetDashboard();
                return;
            }

            const sessions = [...status.sessions].sort((a, b) => {
                const aStart = new Date(a.started_at || 0).getTime();
                const bStart = new Date(b.started_at || 0).getTime();
                return aStart - bStart;
            });

            const running = sessions.filter(s => ['spawned', 'working', 'pending'].includes((s.status || '').toLowerCase()));
            const completed = sessions.filter(s => (s.status || '').toLowerCase() === 'completed');
            const failed = sessions.filter(s => (s.status || '').toLowerCase() === 'failed');

            setDashboardMetric('tasksInFlight', running.length);
            setDashboardMetric('completedCount', completed.length);
            setDashboardMetric('timeSaved', formatTime(calculateTimeSaved(sessions)));
            setDashboardMetric('efficiency', `${calculateEfficiency(sessions)}%`);

            const meta = document.getElementById('agentTimelineMeta');
            if (meta) {
                meta.textContent = `${sessions.length} session${sessions.length === 1 ? '' : 's'} • ${running.length} active`;
            }

            const metaBadge = document.getElementById('dashboardMeta');
            if (metaBadge) {
                metaBadge.textContent = failed.length ? 'Attention required' : 'Live';
            }

            dashboard.style.display = 'block';
            renderAgentTimeline(sessions);
        }

        function resetDashboard() {
            setDashboardMetric('tasksInFlight', 0);
            setDashboardMetric('completedCount', 0);
            setDashboardMetric('timeSaved', '0s');
            setDashboardMetric('efficiency', '100%');

            const timeline = document.getElementById('agentTimeline');
            if (timeline) timeline.innerHTML = '<div class="timeline-empty">No active sessions</div>';

            const meta = document.getElementById('agentTimelineMeta');
            if (meta) meta.textContent = '0 sessions';

            const metaBadge = document.getElementById('dashboardMeta');
            if (metaBadge) metaBadge.textContent = 'Idle';

            const dashboard = document.getElementById('orchestratorDashboard');
            if (dashboard) dashboard.style.display = 'none';
        }

        function setDashboardMetric(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value;
        }

        function calculateTimeSaved(sessions) {
            const completed = (sessions || []).filter(s => s.started_at && s.completed_at);
            if (completed.length === 0) return 0;

            const sequentialMs = completed.reduce((total, session) => {
                const start = new Date(session.started_at).getTime();
                const end = new Date(session.completed_at).getTime();
                if (!Number.isFinite(start) || !Number.isFinite(end)) return total;
                return total + Math.max(0, end - start);
            }, 0);

            const times = completed.map(session => {
                const start = new Date(session.started_at).getTime();
                const end = new Date(session.completed_at).getTime();
                return { start, end };
            }).filter(t => Number.isFinite(t.start) && Number.isFinite(t.end));

            if (times.length === 0 || sequentialMs <= 0) return 0;

            const earliest = Math.min(...times.map(t => t.start));
            const latest = Math.max(...times.map(t => t.end));
            const parallelMs = Math.max(0, latest - earliest);

            return Math.max(0, (sequentialMs - parallelMs) / 1000);
        }

        function calculateEfficiency(sessions) {
            const completed = (sessions || []).filter(s => s.started_at && s.completed_at);
            if (completed.length === 0) return 100;

            const sequentialMs = completed.reduce((total, session) => {
                const start = new Date(session.started_at).getTime();
                const end = new Date(session.completed_at).getTime();
                if (!Number.isFinite(start) || !Number.isFinite(end)) return total;
                return total + Math.max(0, end - start);
            }, 0);

            const times = completed.map(session => {
                const start = new Date(session.started_at).getTime();
                const end = new Date(session.completed_at).getTime();
                return { start, end };
            }).filter(t => Number.isFinite(t.start) && Number.isFinite(t.end));

            if (times.length === 0 || sequentialMs <= 0) return 100;

            const earliest = Math.min(...times.map(t => t.start));
            const latest = Math.max(...times.map(t => t.end));
            const parallelMs = Math.max(0, latest - earliest);
            const savedMs = Math.max(0, sequentialMs - parallelMs);

            return Math.min(100, Math.max(0, Math.round((savedMs / sequentialMs) * 100)));
        }

        function renderAgentTimeline(sessions) {
            const timeline = document.getElementById('agentTimeline');
            if (!timeline) return;
            timeline.innerHTML = '';

            if (!sessions || sessions.length === 0) {
                timeline.innerHTML = '<div class="timeline-empty">No active sessions</div>';
                return;
            }

            sessions.forEach(session => {
                const status = (session.status || 'pending').toLowerCase();
                const statusClass = status === 'failed' ? 'failed' : status === 'completed' ? 'completed' : 'running';
                const badgeText = (session.status || 'pending').toUpperCase();
                const agentId = session.agent_id || 'agent';
                const taskId = session.task_id || 'Unknown task';
                const progress = Math.max(0, Math.min(100, parseInt(session.progress ?? 0, 10) || 0));

                const row = document.createElement('div');
                row.className = `agent-row state-${statusClass}`;
                row.style.cssText = `
                    display: flex;
                    align-items: center;
                    padding: 8px 12px;
                    margin-bottom: 8px;
                    background: rgba(255,255,255,0.05);
                    border-radius: 6px;
                    border-left: 3px solid ${status === 'failed' ? '#c85050' : status === 'completed' ? '#50c878' : '#a050c8'};
                `;

                row.innerHTML = `
                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                            <span class="agent-badge" style="
                                padding: 2px 6px;
                                border-radius: 3px;
                                font-size: 0.7em;
                                font-weight: bold;
                                background: ${status === 'failed' ? '#c85050' : status === 'completed' ? '#50c878' : '#a050c8'};
                                color: white;
                            ">${badgeText}</span>
                            <strong style="color: #e8e8e8;">${agentId}</strong>
                            <span style="color: #8fa0c5;">${taskId}</span>
                        </div>
                        <div class="agent-progress" style="
                            background: #2c2c2c;
                            border-radius: 3px;
                            height: 6px;
                            overflow: hidden;
                        ">
                            <div style="
                                background: ${status === 'failed' ? '#c85050' : status === 'completed' ? '#50c878' : '#a050c8'};
                                height: 100%;
                                width: ${progress}%;
                                transition: width 0.3s ease;
                            "></div>
                        </div>
                    </div>
                    <span style="color: #808080; font-size: 0.8em;">${getElapsedTime(session)}</span>
                `;

                const summary = session.result_summary || session.error || '';
                if (summary) {
                    const note = document.createElement('div');
                    note.style.cssText = `
                        margin-top: 6px;
                        padding: 6px 8px;
                        background: rgba(0,0,0,0.3);
                        border-radius: 3px;
                        font-size: 0.8em;
                        color: #cccccc;
                    `;
                    note.textContent = summary;
                    row.appendChild(note);
                }

                timeline.appendChild(row);
            });
        }

        function getElapsedTime(session) {
            if (!session || !session.started_at) return '--';
            const start = new Date(session.started_at).getTime();
            const end = session.completed_at ? new Date(session.completed_at).getTime() : Date.now();
            if (!Number.isFinite(start) || !Number.isFinite(end)) return '--';
            const seconds = Math.max(0, (end - start) / 1000);
            return formatTime(seconds);
        }

        function formatTime(seconds) {
            if (!Number.isFinite(seconds)) return '0s';
            if (seconds < 60) return `${Math.round(seconds)}s`;
            if (seconds < 3600) return `${Math.round(seconds / 60)}m`;
            const hours = seconds / 3600;
            if (hours < 24) return `${hours.toFixed(1)}h`;
            return `${(hours / 24).toFixed(1)}d`;
        }

        // Initialize when page loads
        window.addEventListener('load', init);
    </script>
    <script src="/static/life_monitor.js"></script>
