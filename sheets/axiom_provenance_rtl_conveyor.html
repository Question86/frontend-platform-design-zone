<script>
(function(){
  const pkgLayer = document.getElementById('pkgLayer');
  const rejectLayer = document.getElementById('rejectLayer');
  const beltEl = document.getElementById('beltEl');
  const scanSvgText = document.getElementById('scanSvgText');
  const boardSvgText = document.getElementById('boardSvgText');
  const pkgCountText = document.getElementById('pkgCountText');
  const rejCountText = document.getElementById('rejCountText');
  const villainEl = document.getElementById('villain');
  const villainBubble = document.getElementById('villainBubble');
  const scanBeamEl = document.getElementById('scanBeamEl');
  const statsEl = document.getElementById('statsEl');
  const proofEls = [document.getElementById('p1'),document.getElementById('p2'),document.getElementById('p3'),document.getElementById('p4')];
  const endBanner = document.getElementById('endBanner');
  const pkgCounterSvg = document.getElementById('pkgCounter');
  const pkgCountTextSvg = document.getElementById('pkgCountText');
  const rejCountTextSvg = document.getElementById('rejCountText');

  const SCENE_W = 740;
  const SPAWN_X = 680;
  const DEST_X = 10;
  const VILLAIN_ZONE_X = 420;
  const SCAN_LEFT = 293;
  const SCAN_RIGHT = 377;
  const REJECT_X = 439;
  const BELT_SPEED = 1.2;
  const SPAWN_INTERVAL = 2200;

  let beltOffset = 0;
  let packages = [];
  let totalSpawned = 0;
  let totalVerified = 0;
  let totalRejected = 0;
  let lastSpawn = 0;
  let villainActive = false;
  let villainTarget = null;
  let proofCycle = 0;
  let lastProofTime = 0;
  let boardVerified = false;
  let boardTimer = 0;
  let endShown = false;
  let startTime = Date.now();

  function makePkg(fake) {
    const el = document.createElement('div');
    const delta = fake ? (Math.random() > 0.5 ? '+0.0'+(1+Math.floor(Math.random()*3)) : '-0.0'+(1+Math.floor(Math.random()*2))) : '=0.00';
    const val = (0.88 + Math.random()*0.06).toFixed(2);
    el.style.cssText = `
      position:absolute;
      width:38px;height:32px;
      background:${fake?'#161e38':'#122030'};
      border:2px solid ${fake?'#2a3460':'#1e4060'};
      border-radius:2px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      transition:box-shadow 0.3s;
    `;
    el.innerHTML = `
      <div style="font-size:6px;color:#3a6080;font-family:monospace;">PKG-${String(totalSpawned+1).padStart(3,'0')}</div>
      <div style="font-size:7px;font-family:monospace;font-weight:bold;color:${fake?'#cc4444':'#44aacc'};">v=${val}</div>
      <div style="font-size:5px;font-family:monospace;color:${fake?'#662222':'#225544'};">Δ${delta}</div>
      ${fake?`<div style="position:absolute;top:2px;right:2px;width:4px;height:4px;background:#cc2200;border-radius:1px;animation:glitchFlicker 1.1s infinite;"></div>`:'<div style="position:absolute;top:2px;right:2px;width:4px;height:4px;background:#00aa44;border-radius:1px;"></div>'}
    `;
    return el;
  }

  function spawnPkg(now) {
    const fake = Math.random() < 0.65;
    const el = makePkg(fake);
    pkgLayer.appendChild(el);
    const pkg = {
      el, fake,
      x: SPAWN_X,
      state: 'moving',
      scanStart: 0,
      scanStep: 0,
      rejectStart: 0,
      delivered: false,
      id: ++totalSpawned,
      tampered: false,
    };
    el.style.left = pkg.x + 'px';
    el.style.bottom = '0px';
    packages.push(pkg);
    pkgCounterSvg.textContent = String(totalSpawned).padStart(3,'0');
  }

  function activateProof(idx) {
    proofEls.forEach((p,i)=>{
      if(i<idx){p.style.color='#00ffcc';p.style.borderColor='#00ffcc44';p.style.background='#001a10';}
      else if(i===idx){p.style.color='#00ffcc';p.style.borderColor='#00ffcc';p.style.background='#002218';}
      else{p.style.color='#334';p.style.borderColor='#1a3050';p.style.background='transparent';}
    });
  }

  function resetProofs() {
    proofEls.forEach(p=>{p.style.color='#334';p.style.borderColor='#1a3050';p.style.background='transparent';});
  }

  let raf;
  function loop(now) {
    raf = requestAnimationFrame(loop);
    const elapsed = now - startTime;

    beltOffset = (beltOffset + BELT_SPEED) % 32;
    beltEl.style.backgroundPositionX = (-beltOffset) + 'px';

    if(now - lastSpawn > SPAWN_INTERVAL) {
      spawnPkg(now);
      lastSpawn = now;
    }

    let anyInScanZone = false;

    for(let i = packages.length-1; i>=0; i--) {
      const pkg = packages[i];
      if(pkg.state === 'rejected' || pkg.state === 'done') continue;

      if(pkg.state === 'moving') {
        pkg.x -= BELT_SPEED;
        pkg.el.style.left = pkg.x + 'px';

        if(pkg.x < VILLAIN_ZONE_X + 20 && pkg.x > VILLAIN_ZONE_X - 40 && pkg.fake && !pkg.tampered) {
          pkg.tampered = true;
          villainEl.style.left = (pkg.x + 20) + 'px';
          villainBubble.style.left = (pkg.x + 4) + 'px';
          villainBubble.textContent = '✎';
          villainActive = true;
          setTimeout(()=>{ villainBubble.textContent='!'; villainActive = false; }, 600);
        }

        const pkgMid = pkg.x + 19;
        if(pkgMid >= SCAN_LEFT && pkgMid <= SCAN_RIGHT) {
          anyInScanZone = true;
          if(pkg.scanStart === 0) {
            pkg.scanStart = now;
            pkg.state = 'scanning';
            scanBeamEl.style.opacity = '1';
          }
        }
      }

      if(pkg.state === 'scanning') {
        const scanElapsed = now - pkg.scanStart;
        const step = Math.floor(scanElapsed / 320);
        if(step !== pkg.scanStep) {
          pkg.scanStep = step;
          activateProof(Math.min(step, 3));
        }
        const labels = ['HASH CHK','MANIFEST','STATE.JSON','TRUST-RPT','VERIFIED!'];
        scanSvgText.textContent = labels[Math.min(pkg.scanStep, 4)];

        if(scanElapsed > 1400) {
          if(pkg.fake) {
            pkg.state = 'rejected';
            pkg.el.style.border = '2px solid #cc2200';
            pkg.el.style.background = '#1a0808';
            pkg.el.style.boxShadow = '0 0 8px #cc220066';
            pkg.el.style.left = REJECT_X + 'px';
            const rEl = document.createElement('div');
            rEl.style.cssText = `position:absolute;left:${REJECT_X-5}px;bottom:0;width:32px;height:26px;background:#1a0808;border:2px solid #cc2200;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#ff4444;font-family:monospace;animation:rejectFall 0.8s ease-in forwards;`;
            rEl.textContent = '✕';
            rejectLayer.appendChild(rEl);
            setTimeout(()=>rEl.remove(), 900);
            setTimeout(()=>{ pkg.el.remove(); packages.splice(i,1); },200);
            totalRejected++;
            rejCountText.textContent = `rejected: ${totalRejected}`;
          } else {
            pkg.state = 'moving';
            pkg.el.style.boxShadow = '0 0 10px #00ffcc, 0 0 20px #00ffcc66';
            pkg.el.style.border = '2px solid #00ffcc';
            pkg.el.style.background = '#001a10';
            scanSvgText.textContent = 'VERIFIED!';
            scanSvgText.style.fill = '#00ffcc';
            boardSvgText.textContent = 'OK!';
            boardSvgText.setAttribute('fill','#00ffcc');
            boardVerified = true;
            boardTimer = now;
            totalVerified++;
            pkgCountTextSvg.textContent = `received: ${totalVerified}`;
            if(!endShown && totalVerified >= 2) {
              endShown = true;
              endBanner.style.display = 'block';
            }
          }
          resetProofs();
          scanBeamEl.style.opacity = '0';
        }
      }

      if(pkg.state === 'moving' && pkg.x < DEST_X - 20) {
        pkg.state = 'done';
        pkg.el.remove();
        packages.splice(i,1);
      }
    }

    if(!anyInScanZone && packages.every(p=>p.state!=='scanning')) {
      scanSvgText.textContent = 'SCANNING';
    }

    if(boardVerified && now - boardTimer > 2000) {
      boardVerified = false;
      boardSvgText.textContent = 'WAIT';
      boardSvgText.setAttribute('fill','#334466');
    }

    statsEl.textContent = `pkgs: ${totalSpawned} | ok: ${totalVerified} | faked: ${totalRejected}`;
  }

  lastSpawn = performance.now() - SPAWN_INTERVAL;
  requestAnimationFrame(loop);
})();
</script>
